<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限锻保底计算器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>限锻保底计算器</h1>
    <form id="calculator">
        <label for="max-banners">最大卡池抽取次数:</label>
        <input type="number" id="max-banners" required>

        <label for="min-banners">最低卡池抽取次数:</label>
        <input type="number" id="min-banners" required>

        <button type="submit">计算</button>
    </form>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
